<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.yes{
    background:#ff4d6d;
    color:white;
}

.no{
    background:#888;
    color:white;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

.hidden{
    display:none;
}

#result{
    font-size:18px;
    color:#ff4d6d;
}
</style>
</head>

<body>

<div class="container">

    <!-- First Question -->
    <div id="question">
        <h2>❤️Hi Ema, Will you date with me? ❤️</h2>

        <button class="yes" onclick="showForm()">Yes</button>
        <button class="no" onclick="sayNo()">No</button>
    </div>

    <!-- Form -->
    <div id="form" class="hidden">

        <h2>Yay!! 🎉</h2>

        <input type="date" id="date">

        <input type="time" id="time">

        <input type="text" id="food" placeholder="What do you want to eat?">

        <button class="yes" onclick="submitDate()">Submit ❤️</button>

    </div>

    <!-- Result -->
    <div id="result" class="hidden"></div>

</div>

<script>

function showForm(){
    document.getElementById("question").classList.add("hidden");
    document.getElementById("form").classList.remove("hidden");
}

function sayNo(){
    alert("Aww 😢 Maybe next time.");
}

function submitDate(){

    let date=document.getElementById("date").value;
    let time=document.getElementById("time").value;
    let food=document.getElementById("food").value;

    if(date=="" || time=="" || food==""){
        alert("Please fill all fields.");
        return;
    }

    document.getElementById("form").classList.add("hidden");

    document.getElementById("result").classList.remove("hidden");

    document.getElementById("result").innerHTML=
    `
    ❤️ Date Confirmed ❤️<br><br>

    📅 <b>${date}</b><br>

    ⏰ <b>${time}</b><br>

    🍕 We'll eat <b>${food}</b><br><br>

    Can't wait to see you! 😊💖
    `;
}

</script>

</body>
</html>
